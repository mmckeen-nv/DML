<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>DML Visualizer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="/static/styles.css" />
    <style>
      main.visualizer-page {
        max-width: 1320px;
        margin: 0 auto;
        padding: 24px 16px 40px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .visualizer-card {
        background: rgba(25, 29, 31, 0.92);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        box-shadow: var(--shadow);
      }

      .visualizer-card header {
        margin-bottom: 16px;
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
      }

      .visualizer-card h1 {
        margin: 0 0 6px;
        font-size: clamp(1.7rem, 3vw, 3rem);
        letter-spacing: 0;
      }

      .visualizer-card p {
        margin: 0;
        color: var(--muted);
      }

      .visualizer-embed {
        margin-top: 14px;
      }

      #visualizer-fullscreen-frame {
        width: 100%;
        min-height: min(760px, calc(100vh - 220px));
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #101314;
      }

      .visualizer-actions {
        margin-top: 14px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      #visualizer-page-status {
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: #111516;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        padding: 0 11px;
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main class="visualizer-page">
      <section class="visualizer-card">
        <header>
          <div>
            <p class="eyebrow">Live Lattice</p>
            <h1>DML Visualizer</h1>
            <p>Topology, retrieved nodes, and prompt-driven memory movement.</p>
          </div>
          <div id="visualizer-page-status">Preparing visualizer</div>
        </header>
        <div class="visualizer-embed">
          <iframe
            id="visualizer-fullscreen-frame"
            title="Daystrom Memory Lattice Visualizer"
            loading="lazy"
            allowfullscreen
          ></iframe>
        </div>
        <div class="visualizer-actions">
          <a class="button-link secondary" href="/" rel="noopener">Back to Playground</a>
          <a class="button-link" id="visualizer-open-streamlit" href="#" rel="noopener" target="_blank">
            Open Streamlit App
          </a>
        </div>
      </section>
    </main>
    <script src="/static/visualizer.js" defer></script>
  </body>
</html>
