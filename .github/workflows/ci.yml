name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[server,tokenizer,embeddings,faiss]
      - name: Ruff lint
        run: ruff check .
      - name: Mypy type checking
        run: mypy daystrom_dml/config.py mcp/dml_mcp_server.py bench/bench_dml_vs_rag.py
      - name: Pytest
        run: pytest
