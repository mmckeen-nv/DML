services:
  dml:
    build: .
    runtime: nvidia
    environment:
      DML_PERSISTENCE_ENABLE: "1"
    volumes:
      - ./data:/opt/dml/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
