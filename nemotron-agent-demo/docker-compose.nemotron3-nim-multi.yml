    restart: unless-stopped
    gpus: all
    ipc: host
    volumes:
      - /mnt/md1/models/nim_cache:/models/nim-cache
    environment:
      NGC_API_KEY: ${NGC_API_KEY:-}
      NIM_KV_CACHE_PERCENT: ${NIM_KV_CACHE_PERCENT:-0.15}
      NIM_CACHE_PATH: /models/nim-cache
      NIM_MANIFEST_DOWNLOAD_MAX_RETRY_COUNT: ${NIM_MANIFEST_DOWNLOAD_MAX_RETRY_COUNT:-5}
      NIM_MANIFEST_DOWNLOAD_WAIT_INTERVAL_MS: ${NIM_MANIFEST_DOWNLOAD_WAIT_INTERVAL_MS:-2000}
    ports:
      - "8002:8000"

  nemotron-nim-ops:
    image: nvcr.io/nim/nvidia/nemotron-3-nano:1.7.0-variant
    container_name: nemotron-nim-ops
    restart: unless-stopped
    gpus: all
    ipc: host
    volumes:
      - /mnt/md1/models/nim_cache:/models/nim-cache
    environment:
      NGC_API_KEY: ${NGC_API_KEY:-}
      NIM_KV_CACHE_PERCENT: ${NIM_KV_CACHE_PERCENT:-0.15}
      NIM_CACHE_PATH: /models/nim-cache
      NIM_MANIFEST_DOWNLOAD_MAX_RETRY_COUNT: ${NIM_MANIFEST_DOWNLOAD_MAX_RETRY_COUNT:-5}
      NIM_MANIFEST_DOWNLOAD_WAIT_INTERVAL_MS: ${NIM_MANIFEST_DOWNLOAD_WAIT_INTERVAL_MS:-2000}
    ports:
      - "8003:8000"

  nemotron-nim-aggregator:
    image: nvcr.io/nim/nvidia/nemotron-3-nano:1.7.0-variant
    container_name: nemotron-nim-aggregator
    restart: unless-stopped
    gpus: all
    ipc: host
    volumes:
      - /mnt/md1/models/nim_cache:/models/nim-cache
    environment:
      NGC_API_KEY: ${NGC_API_KEY:-}
      NIM_KV_CACHE_PERCENT: ${NIM_KV_CACHE_PERCENT:-0.15}
      NIM_CACHE_PATH: /models/nim-cache
