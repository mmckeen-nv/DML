    ports:
      - "8004:8000"

  nemotron-ui:
    environment:
      VLLM_BASE_URL: http://nemotron-nim-aggregator:8000/v1
      ROLE_BASE_URL_SUPERVISOR: http://nemotron-nim-aggregator:8000/v1
      ROLE_BASE_URL_PLANNER: http://nemotron-nim-planner:8000/v1
      ROLE_BASE_URL_CODER: http://nemotron-nim-coder:8000/v1
      ROLE_BASE_URL_REVIEWER: http://nemotron-nim-reviewer:8000/v1
      ROLE_BASE_URL_OPS: http://nemotron-nim-ops:8000/v1
      ROLE_BASE_URL_AGGREGATOR: http://nemotron-nim-aggregator:8000/v1
      VLLM_MODEL_ID: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4

  dml-service:
    environment:
      VLLM_BASE_URL: http://nemotron-nim-aggregator:8000/v1
      ROLE_BASE_URL_SUPERVISOR: http://nemotron-nim-aggregator:8000/v1
      ROLE_BASE_URL_PLANNER: http://nemotron-nim-planner:8000/v1
      ROLE_BASE_URL_CODER: http://nemotron-nim-coder:8000/v1
      ROLE_BASE_URL_REVIEWER: http://nemotron-nim-reviewer:8000/v1
      ROLE_BASE_URL_OPS: http://nemotron-nim-ops:8000/v1
      ROLE_BASE_URL_AGGREGATOR: http://nemotron-nim-aggregator:8000/v1
